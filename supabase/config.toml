# Zapfy — Supabase local dev config
# Instalar CLI: brew install supabase/tap/supabase
# Iniciar: supabase start

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
enable_signup = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]

[functions.create-child-profile]
verify_jwt = true

[functions.exchange-invite-code]
verify_jwt = false
